<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - ViOs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <style>
        body { background-color: #0b0c10; min-height: 100vh; }
        .login-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(13, 202, 240, 0.2);
            backdrop-filter: blur(15px);
        }
    </style>
</head>
<body class="text-white d-flex align-items-center justify-content-center">

    <div class="position-absolute rounded-circle bg-info opacity-10" style="width: 300px; height: 300px; top: 20%; left: 15%; filter: blur(80px);"></div>
    <div class="position-absolute rounded-circle bg-purple opacity-10" style="width: 250px; height: 250px; bottom: 20%; right: 15%; filter: blur(80px); background-color: #6f42c1;"></div>

    <div class="p-4 rounded-4 text-center shadow-lg login-card" style="width: 100%; max-width: 400px; z-index: 10;">
        <div class="mb-4">
            <span class="fs-2 fw-bold text-white">ViOs</span>
            <span class="badge bg-info text-dark ms-2 small" style="font-size: 0.7rem; vertical-align: middle;">CONTROL</span>
            <p class="text-white-50 small mt-2 mb-0">Ingresa tus credenciales para continuar</p>
        </div>

        <form id="formAdminLogin">
            <div class="mb-3 text-start">
                <label class="form-label small text-white-50">Correo Electrónico</label>
                <div class="input-group">
                    <span class="input-group-text bg-dark border-secondary text-white-50"><i class="bi bi-envelope-fill"></i></span>
                    <input type="email" id="adminEmailInput" class="form-control bg-dark border-secondary text-white" placeholder="admin@vios.com" required>
                </div>
            </div>

            <div class="mb-3 text-start">
                <label class="form-label small text-white-50">Contraseña</label>
                <div class="input-group">
                    <span class="input-group-text bg-dark border-secondary text-white-50"><i class="bi bi-lock-fill"></i></span>
                    <input type="password" id="adminPasswordInput" class="form-control bg-dark border-secondary text-white" placeholder="••••••••" required>
                </div>
            </div>

            <div id="loginErrorMsg" class="text-danger small mt-2 d-none">
                <i class="bi bi-exclamation-triangle-fill me-1"></i> Credenciales incorrectas.
            </div>

            <button type="submit" class="btn btn-info w-100 rounded-pill py-2 fw-bold text-dark mt-2">
                <i class="bi bi-shield-lock-fill me-1"></i> Acceder al Panel
            </button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/conexion.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
